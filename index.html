<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Glow: Hyperdrive</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;600&display=swap');

        :root {
            --bg-color: #020205;
            --snake-color: #00f2ff;
            --apple-color: #ff0055;
            --gold-color: #ffcc00;
            --ui-panel: rgba(255, 255, 255, 0.03);
        }

        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 50% 50%, #0a0a1a 0%, #020205 100%);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            color: white;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            display: flex;
            gap: 15px;
            z-index: 10;
        }

        .glass-card {
            background: var(--ui-panel);
            backdrop-filter: blur(15px);
            padding: 8px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            min-width: 80px;
        }

        .stat-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem;
            color: #888;
            text-transform: uppercase;
        }

        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--snake-color);
            text-shadow: 0 0 15px var(--snake-color);
        }

        #game-container {
            position: relative;
            transition: transform 0.3s ease;
        }

        canvas {
            display: block;
            border-radius: 15px;
            background: #000;
            box-shadow: 0 0 40px rgba(0,0,0,0.5), inset 0 0 100px rgba(0, 242, 255, 0.05);
        }

        #game-over {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            margin: 0;
            color: #ff0055;
            text-shadow: 0 0 20px #ff0055;
        }

        .final-score { margin-bottom: 20px; color: #aaa; }

        button {
            padding: 12px 35px;
            font-family: 'Orbitron', sans-serif;
            background: transparent;
            color: var(--snake-color);
            border: 2px solid var(--snake-color);
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        button:hover {
            background: var(--snake-color);
            color: #000;
            box-shadow: 0 0 25px var(--snake-color);
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="glass-card">
            <div class="stat-label">Score</div>
            <div id="score" class="stat-value">0</div>
        </div>
        <div class="glass-card">
            <div class="stat-label">Best</div>
            <div id="high-score" class="stat-value">0</div>
        </div>
        <div class="glass-card" id="multiplier-card" style="display:none">
            <div class="stat-label">Combo</div>
            <div id="multiplier" class="stat-value" style="color:var(--gold-color)">x1</div>
        </div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="game-over">
            <h2>SYSTEM FAILURE</h2>
            <p class="final-score">Score final: <span id="final-score-val">0</span></p>
            <button id="restart-btn">Reboot System</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('high-score');
        const gameOverScreen = document.getElementById('game-over');
        const restartBtn = document.getElementById('restart-btn');
        const multiplierElement = document.getElementById('multiplier');
        const multiplierCard = document.getElementById('multiplier-card');

        const COLS = 22;
        const ROWS = 22;
        const TILE_SIZE = 25;

        canvas.width = COLS * TILE_SIZE;
        canvas.height = ROWS * TILE_SIZE;

        let snake, apple, direction, nextDirection, score, gameLoop, isGameOver;
        let particles = [];
        let gameSpeed = 120;
        let combo = 0;
        let comboTimer = 0;
        let highScore = localStorage.getItem('snakeHighScoreHyper') || 0;
        
        highScoreElement.textContent = highScore;

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.size = Math.random() * 4 + 1;
                this.speedX = (Math.random() - 0.5) * 10;
                this.speedY = (Math.random() - 0.5) * 10;
                this.life = 1.0;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                this.life -= 0.03;
            }
            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        function initGame() {
            snake = [{x: 10, y: 11}, {x: 9, y: 11}, {x: 8, y: 11}];
            direction = 'RIGHT';
            nextDirection = 'RIGHT';
            score = 0;
            gameSpeed = 120;
            combo = 0;
            scoreElement.textContent = score;
            spawnApple();
            isGameOver = false;
            gameOverScreen.style.display = 'none';
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(update, gameSpeed);
        }

        function spawnApple() {
            const isGold = Math.random() < 0.1; // 10% chance de maçã dourada
            apple = {
                x: Math.floor(Math.random() * COLS),
                y: Math.floor(Math.random() * ROWS),
                type: isGold ? 'gold' : 'normal',
                pulse: 0
            };
            if (snake.some(s => s.x === apple.x && s.y === apple.y)) spawnApple();
        }

        function update() {
            if (isGameOver) return;

            direction = nextDirection;
            const head = { ...snake[0] };

            if (direction === 'RIGHT') head.x++;
            else if (direction === 'LEFT') head.x--;
            else if (direction === 'UP') head.y--;
            else if (direction === 'DOWN') head.y++;

            // Colisões
            if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS || 
                snake.some((s, i) => i !== 0 && s.x === head.x && s.y === head.y)) {
                return gameOver();
            }

            snake.unshift(head);

            if (head.x === apple.x && head.y === apple.y) {
                // Sistema de Combo
                combo++;
                comboTimer = 15;
                const points = apple.type === 'gold' ? 50 : 10;
                score += points * Math.min(combo, 4);
                
                scoreElement.textContent = score;
                createExplosion(head.x * TILE_SIZE + 12, head.y * TILE_SIZE + 12, apple.type === 'gold' ? '#ffcc00' : '#ff0055');

                if (apple.type === 'gold' && snake.length > 5) {
                    snake.pop(); snake.pop(); // Reduz a cobra!
                }

                if (score > highScore) {
                    highScore = score;
                    highScoreElement.textContent = highScore;
                    localStorage.setItem('snakeHighScoreHyper', highScore);
                }

                // Velocidade Dinâmica
                if (gameSpeed > 60) {
                    gameSpeed -= 1;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(update, gameSpeed);
                }
                
                spawnApple();
            } else {
                snake.pop();
            }

            if (comboTimer > 0) {
                comboTimer--;
                multiplierCard.style.display = 'block';
                multiplierElement.textContent = `x${Math.min(combo, 4)}`;
            } else {
                combo = 0;
                multiplierCard.style.display = 'none';
            }

            render();
        }

        function createExplosion(x, y, color) {
            for (let i = 0; i < 20; i++) particles.push(new Particle(x, y, color));
        }

        function render() {
            // Efeito de rastro (Motion Blur)
            ctx.fillStyle = 'rgba(2, 2, 5, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Grid sutil
            ctx.strokeStyle = "rgba(0, 242, 255, 0.03)";
            for(let i=0; i<COLS; i++) {
                ctx.strokeRect(i*TILE_SIZE, 0, 0.1, canvas.height);
                ctx.strokeRect(0, i*TILE_SIZE, canvas.width, 0.1);
            }

            particles.forEach((p, i) => {
                p.update(); p.draw();
                if (p.life <= 0) particles.splice(i, 1);
            });

            // Desenhar Maçã
            const ax = apple.x * TILE_SIZE + TILE_SIZE/2;
            const ay = apple.y * TILE_SIZE + TILE_SIZE/2;
            apple.pulse += 0.15;
            const s = Math.sin(apple.pulse) * 4;
            
            ctx.shadowBlur = 15 + s;
            ctx.shadowColor = apple.type === 'gold' ? '#ffcc00' : '#ff0055';
            ctx.fillStyle = ctx.shadowColor;
            ctx.beginPath();
            ctx.arc(ax, ay, 8 + s/2, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Desenhar Cobra
            snake.forEach((seg, i) => {
                const x = seg.x * TILE_SIZE;
                const y = seg.y * TILE_SIZE;
                ctx.fillStyle = i === 0 ? '#00f2ff' : `rgba(0, 150, 255, ${1 - i/snake.length})`;
                ctx.shadowBlur = i === 0 ? 20 : 0;
                ctx.shadowColor = '#00f2ff';
                
                ctx.beginPath();
                ctx.roundRect(x + 2, y + 2, TILE_SIZE - 4, TILE_SIZE - 4, i === 0 ? 8 : 4);
                ctx.fill();
            });
        }

        function gameOver() {
            isGameOver = true;
            clearInterval(gameLoop);
            document.getElementById('final-score-val').textContent = score;
            gameOverScreen.style.display = 'flex';
            canvas.style.filter = "grayscale(1) brightness(0.5)";
        }

        window.addEventListener('keydown', e => {
            const keys = {ArrowUp:'UP',w:'UP',ArrowDown:'DOWN',s:'DOWN',ArrowLeft:'LEFT',a:'LEFT',ArrowRight:'RIGHT',d:'RIGHT'};
            const newDir = keys[e.key];
            if (newDir) {
                const opposites = {UP:'DOWN', DOWN:'UP', LEFT:'RIGHT', RIGHT:'LEFT'};
                if (newDir !== opposites[direction]) nextDirection = newDir;
            }
        });

        restartBtn.addEventListener('click', () => {
            canvas.style.filter = "none";
            initGame();
        });

        initGame();
    </script>
</body>
</html>
