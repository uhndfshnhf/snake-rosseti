<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Glow: Tactical Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;600&display=swap');

        :root {
            --bg-color: #020205;
            --snake-color: #00f2ff;
            --apple-color: #ff0055;
            --gold-color: #ffcc00;
            --wall-color: #444;
            --warning-color: #ff0055;
            --ui-panel: rgba(255, 255, 255, 0.03);
        }

        body {
            margin: 0; display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 100vh;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 50%, #0a0a1a 0%, #020205 100%);
            font-family: 'Poppins', sans-serif; overflow: hidden; color: white;
        }

        #ui-layer {
            position: absolute; top: 20px; display: flex; gap: 15px; z-index: 10;
        }

        .glass-card {
            background: var(--ui-panel); backdrop-filter: blur(15px);
            padding: 8px 20px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1); text-align: center; min-width: 90px;
        }

        .stat-label { font-family: 'Orbitron', sans-serif; font-size: 0.65rem; color: #888; text-transform: uppercase; }
        .stat-value { font-family: 'Orbitron', sans-serif; font-size: 1.4rem; font-weight: 700; color: var(--snake-color); }

        #combo-timer-container {
            width: 100%; height: 4px; background: rgba(255,255,255,0.1);
            margin-top: 5px; border-radius: 2px; overflow: hidden;
        }
        #combo-timer-bar {
            width: 100%; height: 100%; background: var(--gold-color);
            transition: width 0.1s linear;
        }

        #game-container { position: relative; }

        #warning-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-family: 'Orbitron'; color: #ff0055; font-size: 1.5rem;
            text-shadow: 0 0 10px #ff0055; pointer-events: none; 
            display: none; z-index: 50; text-align: center;
            animation: blink 0.5s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.3; }
        }

        canvas {
            display: block; border-radius: 15px; background: #000;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        #game-over {
            position: absolute; inset: 0; background: rgba(0, 0, 0, 0.9);
            display: none; flex-direction: column; align-items: center;
            justify-content: center; border-radius: 15px; backdrop-filter: blur(10px); z-index: 100;
        }

        button {
            padding: 12px 35px; font-family: 'Orbitron', sans-serif;
            background: transparent; color: var(--snake-color);
            border: 2px solid var(--snake-color); border-radius: 5px;
            cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="glass-card">
            <div class="stat-label">Score</div>
            <div id="score" class="stat-value">0</div>
        </div>
        <div class="glass-card">
            <div class="stat-label">Best</div>
            <div id="high-score" class="stat-value">0</div>
        </div>
        <div class="glass-card" id="multiplier-card" style="visibility: hidden;">
            <div class="stat-label">Combo <span id="multiplier-text">x1</span></div>
            <div id="combo-timer-container">
                <div id="combo-timer-bar"></div>
            </div>
        </div>
    </div>

    <div id="game-container">
        <div id="warning-text">OBSTACLE INBOUND<br><small style="font-size:0.8rem">WATCH YOUR STEP</small></div>
        <canvas id="gameCanvas"></canvas>
        <div id="game-over">
            <h2 style="color:#ff0055; font-family:'Orbitron'">TERMINATED</h2>
            <p id="final-score-val" style="margin-bottom:20px">Score: 0</p>
            <button id="restart-btn">Restart</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('high-score');
        const multiplierCard = document.getElementById('multiplier-card');
        const multiplierText = document.getElementById('multiplier-text');
        const comboBar = document.getElementById('combo-timer-bar');
        const warningLabel = document.getElementById('warning-text');

        const COLS = 22; const ROWS = 22; const TILE_SIZE = 25;
        canvas.width = COLS * TILE_SIZE; canvas.height = ROWS * TILE_SIZE;

        let snake, apple, obstacles, direction, nextDirection, score, gameLoop, isGameOver;
        let combo = 0; let comboTimer = 0; const MAX_COMBO_TIME = 30; 
        
        let pendingObstacles = [];
        let spawnTimer = 0; 
        const SPAWN_DELAY = 18; // Tempo do timer (frames)

        let highScore = localStorage.getItem('snakeHighScoreTactical') || 0;
        highScoreElement.textContent = highScore;

        function initGame() {
            snake = [{x: 10, y: 11}, {x: 9, y: 11}, {x: 8, y: 11}];
            obstacles = [];
            pendingObstacles = [];
            spawnTimer = 0;
            direction = 'RIGHT'; nextDirection = 'RIGHT';
            score = 0; combo = 0; comboTimer = 0;
            scoreElement.textContent = score;
            warningLabel.style.display = 'none';
            prepareObstacles(); 
            spawnApple();
            isGameOver = false;
            document.getElementById('game-over').style.display = 'none';
            canvas.style.filter = "none";
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(update, 110);
        }

        function prepareObstacles() {
            pendingObstacles = [];
            spawnTimer = SPAWN_DELAY;
            warningLabel.style.display = 'block';
            
            // Dificuldade progressiva: mais blocos conforme a pontuação sobe
            const numObstacles = 4 + Math.floor(score / 50) * 2; 
            
            for (let i = 0; i < numObstacles; i++) {
                let obs = {
                    x: Math.floor(Math.random() * COLS),
                    y: Math.floor(Math.random() * ROWS)
                };
                
                // Evita spawnar exatamente na cabeça da cobra
                const isNearHead = (obs.x === snake[0].x && obs.y === snake[0].y);
                if (!isNearHead) {
                    pendingObstacles.push(obs);
                }
            }
        }

        function spawnApple() {
            apple = {
                x: Math.floor(Math.random() * COLS),
                y: Math.floor(Math.random() * ROWS),
                type: Math.random() < 0.1 ? 'gold' : 'normal'
            };
            // Não deixa maçã nascer dentro de obstáculos sólidos
            if (snake.some(s => s.x === apple.x && s.y === apple.y) || 
                obstacles.some(o => o.x === apple.x && o.y === apple.y)) {
                spawnApple();
            }
        }

        function update() {
            if (isGameOver) return;
            direction = nextDirection;
            const head = { ...snake[0] };

            if (direction === 'RIGHT') head.x++;
            else if (direction === 'LEFT') head.x--;
            else if (direction === 'UP') head.y--;
            else if (direction === 'DOWN') head.y++;

            // Colisões Letais
            if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS || 
                snake.some(s => s.x === head.x && s.y === head.y) ||
                obstacles.some(o => o.x === head.x && o.y === head.y)) {
                return gameOver();
            }

            snake.unshift(head);

            if (head.x === apple.x && head.y === apple.y) {
                const oldScore = score;
                combo++;
                comboTimer = MAX_COMBO_TIME;
                score += (apple.type === 'gold' ? 50 : 10) * Math.min(combo, 4);
                scoreElement.textContent = score;

                // A cada 50 pontos, reseta o mapa e prepara novos obstáculos
                if (Math.floor(score / 50) > Math.floor(oldScore / 50)) {
                    obstacles = []; // Limpa os antigos para o novo layout
                    prepareObstacles();
                }

                if (score > highScore) {
                    highScore = score;
                    highScoreElement.textContent = highScore;
                    localStorage.setItem('snakeHighScoreTactical', highScore);
                }
                spawnApple();
            } else {
                snake.pop();
            }

            // Lógica do Timer de Nascimento das Paredes
            if (spawnTimer > 0) {
                spawnTimer--;
                if (spawnTimer === 0) {
                    obstacles = [...pendingObstacles];
                    pendingObstacles = [];
                    warningLabel.style.display = 'none';
                }
            }

            // Cronômetro do Combo
            if (comboTimer > 0) {
                comboTimer--;
                multiplierCard.style.visibility = 'visible';
                multiplierText.textContent = `x${Math.min(combo, 4)}`;
                comboBar.style.width = (comboTimer / MAX_COMBO_TIME) * 100 + "%";
            } else {
                combo = 0;
                multiplierCard.style.visibility = 'hidden';
            }

            render();
        }

        function render() {
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 1. Desenhar Obstáculos Sólidos (Cinzas)
            ctx.fillStyle = '#333';
            ctx.shadowBlur = 0;
            obstacles.forEach(o => {
                ctx.beginPath();
                ctx.roundRect(o.x * TILE_SIZE + 2, o.y * TILE_SIZE + 2, TILE_SIZE - 4, TILE_SIZE - 4, 3);
                ctx.fill();
            });

            // 2. Desenhar Aviso de Obstáculos (Vermelho Pulsante - Sem Colisão ainda)
            pendingObstacles.forEach(p => {
                ctx.strokeStyle = '#ff0055';
                ctx.lineWidth = 2;
                ctx.strokeRect(p.x * TILE_SIZE + 4, p.y * TILE_SIZE + 4, TILE_SIZE - 8, TILE_SIZE - 8);
                
                ctx.fillStyle = `rgba(255, 0, 85, ${0.1 + Math.abs(Math.sin(Date.now()/200) * 0.3)})`;
                ctx.fillRect(p.x * TILE_SIZE + 2, p.y * TILE_SIZE + 2, TILE_SIZE - 4, TILE_SIZE - 4);
            });

            // 3. Desenhar Maçã
            ctx.shadowBlur = 15;
            ctx.shadowColor = apple.type === 'gold' ? '#ffcc00' : '#ff0055';
            ctx.fillStyle = ctx.shadowColor;
            ctx.beginPath();
            ctx.arc(apple.x * TILE_SIZE + TILE_SIZE/2, apple.y * TILE_SIZE + TILE_SIZE/2, 8, 0, Math.PI*2);
            ctx.fill();

            // 4. Desenhar Cobra
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00f2ff';
            snake.forEach((seg, i) => {
                ctx.fillStyle = i === 0 ? '#00f2ff' : `rgba(0, 150, 255, ${1 - i/snake.length})`;
                ctx.beginPath();
                ctx.roundRect(seg.x * TILE_SIZE + 1, seg.y * TILE_SIZE + 1, TILE_SIZE - 2, TILE_SIZE - 2, i === 0 ? 8 : 4);
                ctx.fill();
            });
        }

        function gameOver() {
            isGameOver = true;
            clearInterval(gameLoop);
            document.getElementById('final-score-val').textContent = "Score Final: " + score;
            document.getElementById('game-over').style.display = 'flex';
            canvas.style.filter = "grayscale(1) contrast(1.2)";
        }

        window.addEventListener('keydown', e => {
            const keys = {ArrowUp:'UP',w:'UP',ArrowDown:'DOWN',s:'DOWN',ArrowLeft:'LEFT',a:'LEFT',ArrowRight:'RIGHT',d:'RIGHT'};
            const newDir = keys[e.key];
            if (newDir) {
                const opposites = {UP:'DOWN', DOWN:'UP', LEFT:'RIGHT', RIGHT:'LEFT'};
                if (newDir !== opposites[direction]) nextDirection = newDir;
            }
        });

        document.getElementById('restart-btn').addEventListener('click', initGame);
        initGame();
    </script>
</body>
</html>
