<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Glow - 2026 Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;600&display=swap');

        :root {
            --bg-color: #050505;
            --snake-color: #00f2ff;
            --apple-color: #ff0055;
            --ui-panel: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050505 100%);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            color: white;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            display: flex;
            gap: 20px;
            z-index: 10;
        }

        .glass-card {
            background: var(--ui-panel);
            backdrop-filter: blur(10px);
            padding: 10px 25px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .stat-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--snake-color);
            text-shadow: 0 0 10px var(--snake-color);
        }

        #game-container {
            position: relative;
            border-radius: 20px;
            padding: 10px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
        }

        canvas {
            display: block;
            border-radius: 12px;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.1);
        }

        #game-over {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            backdrop-filter: blur(8px);
            z-index: 100;
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            margin-bottom: 20px;
            background: linear-gradient(to right, #ff0055, #ff9900);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(255,0,85,0.5));
        }

        button {
            padding: 15px 40px;
            font-family: 'Orbitron', sans-serif;
            background: transparent;
            color: var(--snake-color);
            border: 2px solid var(--snake-color);
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
        }

        button:hover {
            background: var(--snake-color);
            color: black;
            box-shadow: 0 0 30px var(--snake-color);
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="glass-card">
            <div>
                <div class="stat-label">Score</div>
                <div id="score" class="stat-value">0</div>
            </div>
        </div>
        <div class="glass-card">
            <div>
                <div class="stat-label">Best</div>
                <div id="high-score" class="stat-value">0</div>
            </div>
        </div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="game-over">
            <h2>CRITICAL ERROR</h2>
            <button id="restart-btn">Try Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('high-score');
        const gameOverScreen = document.getElementById('game-over');
        const restartBtn = document.getElementById('restart-btn');

        const COLS = 20;
        const ROWS = 20;
        const TILE_SIZE = 25;

        canvas.width = COLS * TILE_SIZE;
        canvas.height = ROWS * TILE_SIZE;

        let snake, apple, direction, nextDirection, score, gameLoop, isGameOver;
        let particles = [];
        let gameSpeed = 130;
        let highScore = localStorage.getItem('snakeHighScoreModern') || 0;
        highScoreElement.textContent = highScore;

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = Math.random() * 3 + 1;
                this.speedX = (Math.random() - 0.5) * 8;
                this.speedY = (Math.random() - 0.5) * 8;
                this.life = 1.0;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= 0.02;
            }
            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size);
                ctx.globalAlpha = 1.0;
            }
        }

        function initGame() {
            snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
            direction = 'RIGHT';
            nextDirection = 'RIGHT';
            score = 0;
            gameSpeed = 130;
            scoreElement.textContent = score;
            spawnApple();
            isGameOver = false;
            gameOverScreen.style.display = 'none';
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(update, gameSpeed);
        }

        function spawnApple() {
            apple = {
                x: Math.floor(Math.random() * COLS),
                y: Math.floor(Math.random() * ROWS),
                pulse: 0
            };
            if (snake.some(s => s.x === apple.x && s.y === apple.y)) spawnApple();
        }

        function createExplosion(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function drawGrid() {
            ctx.strokeStyle = "rgba(255, 255, 255, 0.03)";
            ctx.lineWidth = 1;
            for (let i = 0; i <= COLS; i++) {
                ctx.beginPath();
                ctx.moveTo(i * TILE_SIZE, 0);
                ctx.lineTo(i * TILE_SIZE, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * TILE_SIZE);
                ctx.lineTo(canvas.width, i * TILE_SIZE);
                ctx.stroke();
            }
        }

        function drawSnake() {
            snake.forEach((segment, index) => {
                const isHead = index === 0;
                const x = segment.x * TILE_SIZE;
                const y = segment.y * TILE_SIZE;

                ctx.save();
                ctx.shadowBlur = isHead ? 20 : 10;
                ctx.shadowColor = '#00f2ff';
                
                // Gradiente para o corpo
                const grad = ctx.createLinearGradient(x, y, x + TILE_SIZE, y + TILE_SIZE);
                grad.addColorStop(0, isHead ? '#00f2ff' : '#0066ff');
                grad.addColorStop(1, isHead ? '#00ccff' : '#0033aa');
                
                ctx.fillStyle = grad;
                
                // Desenho arredondado
                const r = isHead ? 8 : 4;
                ctx.beginPath();
                ctx.roundRect(x + 1, y + 1, TILE_SIZE - 2, TILE_SIZE - 2, r);
                ctx.fill();
                
                if (isHead) {
                    // Olhos brilhantes
                    ctx.fillStyle = "white";
                    ctx.shadowBlur = 5;
                    const eyeSize = 3;
                    if (direction === 'RIGHT' || direction === 'LEFT') {
                        ctx.fillRect(x + (direction === 'RIGHT' ? 18 : 4), y + 6, eyeSize, eyeSize);
                        ctx.fillRect(x + (direction === 'RIGHT' ? 18 : 4), y + 16, eyeSize, eyeSize);
                    } else {
                        ctx.fillRect(x + 6, y + (direction === 'DOWN' ? 18 : 4), eyeSize, eyeSize);
                        ctx.fillRect(x + 16, y + (direction === 'DOWN' ? 18 : 4), eyeSize, eyeSize);
                    }
                }
                ctx.restore();
            });
        }

        function drawApple() {
            const x = apple.x * TILE_SIZE + TILE_SIZE / 2;
            const y = apple.y * TILE_SIZE + TILE_SIZE / 2;
            
            apple.pulse += 0.1;
            const pulseSize = Math.sin(apple.pulse) * 3;

            ctx.save();
            ctx.shadowBlur = 15 + pulseSize * 2;
            ctx.shadowColor = '#ff0055';
            ctx.fillStyle = '#ff0055';
            ctx.beginPath();
            ctx.arc(x, y, (TILE_SIZE / 2 - 5) + pulseSize/2, 0, Math.PI * 2);
            ctx.fill();
            
            // Brilho interno
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(x - 3, y - 3, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        function update() {
            if (isGameOver) return;

            direction = nextDirection;
            const head = { ...snake[0] };

            if (direction === 'RIGHT') head.x++;
            else if (direction === 'LEFT') head.x--;
            else if (direction === 'UP') head.y--;
            else if (direction === 'DOWN') head.y++;

            // Colisões
            if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS || 
                snake.some(s => s.x === head.x && s.y === head.y)) {
                return gameOver();
            }

            snake.unshift(head);

            if (head.x === apple.x && head.y === apple.y) {
                score += 10;
                scoreElement.textContent = score;
                createExplosion(head.x * TILE_SIZE + 12, head.y * TILE_SIZE + 12, '#ff0055');
                
                if (score > highScore) {
                    highScore = score;
                    highScoreElement.textContent = highScore;
                    localStorage.setItem('snakeHighScoreModern', highScore);
                }

                // Aumentar velocidade
                if (score % 50 === 0 && gameSpeed > 50) {
                    gameSpeed -= 5;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(update, gameSpeed);
                }
                
                spawnApple();
            } else {
                snake.pop();
            }

            render();
        }

        function render() {
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            drawGrid();
            
            particles.forEach((p, i) => {
                p.update();
                p.draw();
                if (p.life <= 0) particles.splice(i, 1);
            });

            drawApple();
            drawSnake();
        }

        function gameOver() {
            isGameOver = true;
            clearInterval(gameLoop);
            gameOverScreen.style.display = 'flex';
            
            // Efeito de shake na tela
            canvas.style.animation = "none";
            setTimeout(() => canvas.style.border = "2px solid #ff0055", 10);
        }

        window.addEventListener('keydown', e => {
            const keys = {
                ArrowUp: 'UP', w: 'UP',
                ArrowDown: 'DOWN', s: 'DOWN',
                ArrowLeft: 'LEFT', a: 'LEFT',
                ArrowRight: 'RIGHT', d: 'RIGHT'
            };
            const newDir = keys[e.key];
            if (newDir) {
                const opposites = { UP: 'DOWN', DOWN: 'UP', LEFT: 'RIGHT', RIGHT: 'LEFT' };
                if (newDir !== opposites[direction]) nextDirection = newDir;
            }
        });

        restartBtn.addEventListener('click', initGame);
        initGame();
    </script>
</body>
</html>
